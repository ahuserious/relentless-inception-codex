name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m compileall -q plugins/relentless-inception
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate JSON syntax
        run: |
          python -m json.tool plugins/relentless-inception/config/default.json >/dev/null
          python -m json.tool plugins/relentless-inception/schemas/config.schema.json >/dev/null
